<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Erosion Simulation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
</head>

<body>
    <div id="ui-container">
        <div id="ui-header">
            <h1>Sand Mountain</h1>
            <button id="ui-toggle">☰</button>
        </div>
        <div id="ui-content">
            <p>🖱️ <strong>Left Drag</strong>: Build mountain</p>
            <p>⇧ <strong>Shift+Drag</strong>: Dig hole</p>
            <p>🔵 <strong>Middle Drag</strong>: Rotate camera</p>
            <p>💧 <strong>Hold R</strong>: Make it rain</p>
            <div class="slider-row">
                <label for="rainRadius">Rain Radius: <span id="rainRadiusVal">1</span></label>
                <input type="range" id="rainRadius">
            </div>
            <div class="slider-row">
                <label for="rainAmount">Rain Amount: <span id="rainAmountVal">1</span></label>
                <input type="range" id="rainAmount">
            </div>
            <div class="slider-row">
                <label for="mountainRadius">Mountain Radius: <span id="mountainRadiusVal">15</span></label>
                <input type="range" id="mountainRadius">
            </div>
            <div class="slider-row">
                <label for="buildStrength">Build Strength: <span id="buildStrengthVal">0.15</span></label>
                <input type="range" id="buildStrength">
            </div>
            <div class="slider-row">
                <label for="maxFlowFactor">Water Flow: <span id="maxFlowVal">0.1</span></label>
                <input type="range" id="maxFlowFactor">
            </div>
            <div class="slider-row">
                <label for="brushSharpness">Brush Sharpness: <span id="sharpnessVal">2.0</span></label>
                <input type="range" id="brushSharpness">
            </div>
            <div class="slider-row">
                <label for="maxSlope">Max Slope (Stability): <span id="maxSlopeVal">2.5</span></label>
                <input type="range" id="maxSlope">
            </div>
            <div class="slider-row">
                <label for="waterOpacity">Water Opacity: <span id="waterOpacityVal">0.7</span></label>
                <input type="range" id="waterOpacity">
            </div>
            <div class="slider-row">
                <label for="sourceEmission">Source Emission: <span id="sourceEmissionVal">0.5</span></label>
                <input type="range" id="sourceEmission">
            </div>
            <div class="checkbox-row">
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="smoothShading" checked>
                    <label for="smoothShading">Smooth Shading</label>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="showGrid">
                    <label for="showGrid">Show Grid</label>
                </div>
            </div>
            <div class="button-row">
                <button id="globalRainBtn">Global Rain: OFF</button>
                <button id="randomBtn">Add Random Hills</button>
            </div>
            <div class="button-row">
                <button id="plantBtn">🌲 Plant Tree: OFF</button>
                <button id="houseBtn">🏠 Build House: OFF</button>
            </div>
            <div class="button-row">
                <button id="importTerrainBtn">🗺️ Import Real Terrain</button>
            </div>
            <div class="button-row">
                <button id="openSettingsBtn">⚙️ Color Settings</button>
                <button id="resetBtn">Reset All</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay modal-hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Color Settings</h3>
                <button id="closeSettingsBtn">&times;</button>
            </div>
            <div class="slider-row">
                <label>Grass Color</label>
                <input type="color" id="colorGrassPicker" value="#aaaaaa">
            </div>
            <div class="slider-row">
                <label>Sand Color</label>
                <input type="color" id="colorSandPicker" value="#eeeeee">
            </div>
            <div class="slider-row">
                <label>Rock Color</label>
                <input type="color" id="colorRockPicker" value="#dddddd">
            </div>
            <div class="slider-row">
                <label>Border Color</label>
                <input type="color" id="colorBorderPicker" value="#444444">
            </div>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- Map Selection Modal -->
    <div id="map-modal" class="modal-overlay modal-hidden">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>Import Real Terrain (Japan)</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Select a 1km x 1km area to import. (GSI Maps elevation data)</p>
                <div id="map-container" style="height: 400px; width: 100%; border-radius: 8px;"></div>
                <div class="modal-info">
                    <span id="coord-display">Lat: ---, Lng: ---</span>
                    <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 4px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="color: #94a3b8; font-size: 0.85rem;">Auto-place Water Sources (High
                                elevation)</label>
                            <span id="autoWaterSourcesVal"
                                style="color: #60a5fa; font-size: 0.85rem; font-weight: bold;">0</span>
                        </div>
                        <input type="range" id="autoWaterSources" min="0" max="10" value="0" step="1"
                            style="width: 100%;">
                    </div>
                    <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="normalizeHeight" checked style="width: auto;">
                        <label for="normalizeHeight" style="color: #94a3b8; font-size: 0.85rem;">Normalize Height (Scale
                            to Range)</label>
                    </div>
                    <div id="heightRangeGroup" style="margin-top: 5px; display: flex; align-items: center; gap: 10px;">
                        <label for="targetHeightRange"
                            style="color: #94a3b8; font-size: 0.85rem; white-space: nowrap;">Target Height
                            Range:</label>
                        <input type="range" id="targetHeightRange" value="40" min="1" max="400" step="1"
                            style="flex: 1;">
                        <span id="targetHeightRangeVal"
                            style="color: #60a5fa; font-size: 0.85rem; width: 30px; text-align: right;">40</span>
                    </div>
                    <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                        <label for="importHardness"
                            style="color: #94a3b8; font-size: 0.85rem; white-space: nowrap;">Terrain Hardness:</label>
                        <input type="range" id="importHardness" value="1.0" min="0.0" max="1.0" step="0.05"
                            style="flex: 1;">
                        <span id="importHardnessVal"
                            style="color: #60a5fa; font-size: 0.85rem; width: 30px; text-align: right;">1.0</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancelImportBtn">Cancel</button>
                <button id="confirmImportBtn" class="primary">Import Area</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
